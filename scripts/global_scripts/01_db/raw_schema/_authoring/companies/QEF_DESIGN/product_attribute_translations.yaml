# product_attribute_translations.yaml
#
# Chinese-to-English canonical translation map for QEF product attribute columns.
# Used by gen_product_attribute_schemas.R to generate product_attribute_schemas.yaml.
#
# Bound by DEV_R056 (Project Primary Language — R First) and SO_R038 (Schema Authoring
# YAML Naming Convention). All canonical names follow ^[a-z][a-z0-9_]*$.
#
# Source: union of column headers from
#   QEF_DESIGN/data/database_to_csv/raw_data/df_product_profile_*.csv (12 files, 319 unique cols)
#
# Naming convention prefixes:
#   material_*       — frame/lens/temple/tip materials
#   protection_*     — UV / blue light / anti-glare protections
#   feature_*        — anti-fog / anti-scratch / etc.
#   dimension_*      — width / height / length / weight measurements
#   rating_*         — review-derived sentiment scores
#   activity_*       — sports / recreational activities
#   user_*           — user persona / profession
#   demographic_*    — age / gender demographics
#   scene_*          — usage scene
#   style_*          — aesthetic style
#   accessory_*      — included accessories
#   standard_*       — certification standards
#   pkg_*            — packaging items
#   service_*        — services
#
# Most recent significant edit: spectra change qef-product-master-redesign Phase 9 task 9.2
# Change discipline: any new translation entry SHALL ship through this file (not inline in
# generator script); modifications SHALL preserve the canonical name to avoid downstream
# bridge yaml drift.

translations:

