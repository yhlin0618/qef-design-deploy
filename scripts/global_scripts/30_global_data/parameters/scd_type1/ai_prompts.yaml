      - 主力客深耕（提升忠誠度）
      - 淺眠客喚醒（最高 ROI 投入）
      - 半睡/沉睡客的成本效益分析

      ### 4. 緊急行動
      列出最優先的 2-3 個行動項目

      限制在 500 字內

