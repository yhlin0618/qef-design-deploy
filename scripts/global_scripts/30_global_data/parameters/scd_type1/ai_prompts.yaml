# ============================================================================
# SECTION 7: Usage Instructions
# ============================================================================
usage:
  description: |
    此配置檔集中管理 MAMBA 儀表板中所有 OpenAI API 的 prompt 模板。
    使用時可通過 YAML 解析器載入，並使用字串替換填入實際數據。
  
  example_code: |
    # R 範例
    library(yaml)
    
    # 載入 prompt 配置
    prompts <- yaml::read_yaml("list_openai_prompt.yaml")
    
    # 取得特定 prompt
    market_track_prompt <- prompts$poisson_analysis$market_track_strategy
    
    # 替換模板變數
    user_content <- gsub("{rating_summary}", 
                        jsonlite::toJSON(rating_data), 
                        market_track_prompt$user_prompt_template)
    
    # 使用 prompt
    messages <- list(
      list(role = "system", content = market_track_prompt$system_prompt),
      list(role = "user", content = user_content)
    )
    
    # 呼叫 OpenAI API (使用配置檔指定的模型)
    response <- openai::create_chat_completion(
      model = market_track_prompt$model,  # 使用 YAML 指定的模型
      messages = messages
    )
  
  variable_substitution:
    description: "使用 {variable_name} 格式標記需要替換的變數"
    special_cases:
      - "{system_prompts.*.content}: 引用其他系統提示"
      - "{data}: 插入 JSON 格式的數據"
      - "{list}: 插入條列式清單"
  
  model_selection_guide:
    description: "每個 prompt 都包含 model 欄位，可指定使用的 OpenAI 模型"
    available_models:
      - "gpt-5.4: 目前統一使用的模型，兼顧推理能力與回應速度"
    selection_strategy: "統一使用 gpt-5.4，所有 prompt 使用相同模型以簡化維運"
    current_assignments:
      all_tasks:
        - "所有 position_analysis prompts: gpt-5.4"
        - "所有 poisson_analysis prompts: gpt-5.4"
        - "所有 customer_analysis prompts: gpt-5.4"
        - "所有 vitalsigns_analysis prompts: gpt-5.4"
        - "所有 integrated_insights prompts: gpt-5.4"
